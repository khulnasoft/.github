name: Security Scanning

on:
  push:
    branches:
      - main  # Trigger on pushes to the main branch
  pull_request:
    branches:
      - main  # Trigger on pull requests to the main branch
  workflow_dispatch:  # Allows manual triggering of the workflow

jobs:
  security-scan:
    runs-on: ubuntu-latest  # Use the latest Ubuntu runner

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Python for security scanning tools
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.8

      # Step 3: Install security tools (e.g., Bandit, Safety)
      - name: Install security tools
        run: |
          pip install bandit  # Python security linter
          pip install safety  # Python security vulnerabilities checker
          pip install git-secrets  # Git secrets scanning

      # Step 4: Run Bandit for Python security linting
      - name: Run Bandit (Python security linter)
        run: |
          bandit -r .  # Scan the entire repository for security issues in Python code

      # Step 5: Run Safety to check for known vulnerabilities
      - name: Run Safety (Check for known vulnerabilities)
        run: |
          safety check  # Scan the dependencies for known vulnerabilities

      # Step 6: Run Git-Secrets to check for sensitive data (e.g., passwords, API keys)
      - name: Run Git-Secrets
        run: |
          git-secrets --scan  # Scan for secrets in the repository (passwords, API keys, etc.)

      # Step 7: Optional: Run other security tools (e.g., Trivy for container security, etc.)
      - name: Run Trivy (Container image security scan)
        run: |
          # Example: Scan a Docker image for vulnerabilities using Trivy
          trivy image --no-progress your-docker-image:latest

      # Step 8: Notify or report on scan results (optional)
      - name: Notify on Scan Results
        if: failure()  # Only notify if any step fails
        run: |
          echo "Security scan failed! Review the results above."
          # Add custom notification logic here (e.g., send Slack message, email, etc.)
          
      # Step 9: Optional: Create an issue for any failed security checks
      - name: Create Issue for Failed Security Checks
        if: failure()
        uses: peter-evans/create-issue-from-file@v3
        with:
          title: "Security Vulnerability Detected"
          file: ./security-issues.md  # Path to a markdown file containing the issue description
