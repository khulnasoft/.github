name: Build and Push OCI Image

on:
  push:
    branches:
      - main  # Trigger the workflow on pushes to the main branch
    paths:
      - 'Dockerfile'  # Trigger only if Dockerfile is changed
  pull_request:
    branches:
      - main  # Trigger the workflow on pull requests to the main branch
    paths:
      - 'Dockerfile'  # Trigger only if Dockerfile is changed

jobs:
  build:
    runs-on: ubuntu-latest  # Use the latest Ubuntu runner
    
    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Docker Buildx (for advanced multi-platform builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Step 3: Log in to Docker registry
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 4: Build the Docker image using Buildx (supports multi-platform builds)
      - name: Build Docker image
        run: |
          docker buildx build --platform linux/amd64,linux/arm64 -t myusername/myapp:${{ github.sha }} .
          # Replace `myusername/myapp` with your image name
          # You can add additional flags or configurations for your build process

      # Step 5: Push the Docker image to Docker registry
      - name: Push Docker image to registry
        run: |
          docker buildx build --platform linux/amd64,linux/arm64 -t myusername/myapp:${{ github.sha }} --push .
          # Replace `myusername/myapp` with your image name
          # This pushes the image to the registry (Docker Hub, GitHub Packages, etc.)
      
      # Step 6: Optionally, notify on successful build (e.g., Slack or email)
      - name: Notify on successful build
        if: success()
        run: |
          echo "OCI image build and push successful!"
          # You can integrate Slack, email, or other notification services here

      # Optional: Notify on failure
      - name: Notify on failed build
        if: failure()
        run: |
          echo "OCI image build failed."
          # You can integrate Slack, email, or other notification services here
